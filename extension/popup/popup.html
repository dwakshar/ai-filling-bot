<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font-family: system-ui, sans-serif; font-size: 13px; padding: 14px; background: #fff; color: #1e293b; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    #platform { font-size: 11px; color: #64748b; margin-bottom: 10px; min-height: 16px; }
    #platform.ok { color: #16a34a; }
    #platform.unsupported { color: #dc2626; }
    button#fillBtn {
      width: 100%; padding: 9px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: background 0.15s;
    }
    button#fillBtn:hover:not(:disabled) { background: #4338ca; }
    button#fillBtn:disabled { background: #a5b4fc; cursor: not-allowed; }
    #log {
      margin-top: 10px; max-height: 190px; overflow-y: auto;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 5px; padding: 8px;
      font-size: 11px; line-height: 1.55;
    }
    #log .err { color: #dc2626; }
    .footer { margin-top: 10px; font-size: 11px; color: #94a3b8; text-align: right; }
    .footer a { color: #6366f1; text-decoration: none; cursor: pointer; }
    .footer a:hover { text-decoration: underline; }
    .note { font-size: 10px; color: #94a3b8; margin-top: 6px; }

    #historySection { margin-top: 12px; }
    .hist-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 5px;
    }
    .hist-title { font-size: 12px; font-weight: 600; color: #475569; }
    .hist-actions { display: flex; gap: 5px; }
    .hist-actions button {
      font-size: 10px; padding: 2px 7px;
      border: 1px solid #cbd5e1; border-radius: 4px;
      background: #f1f5f9; color: #475569; cursor: pointer;
    }
    .hist-actions button:hover { background: #e2e8f0; }
    #historyList {
      max-height: 160px; overflow-y: auto;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 5px;
      font-size: 11px;
    }
    .hist-empty { padding: 8px; color: #94a3b8; text-align: center; }
    .hist-row {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 8px; border-bottom: 1px solid #f1f5f9;
      line-height: 1.4;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-date { color: #94a3b8; white-space: nowrap; flex-shrink: 0; }
    .hist-company { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1e293b; }
    .hist-status {
      font-size: 10px; padding: 1px 5px; border-radius: 3px;
      white-space: nowrap; flex-shrink: 0; font-weight: 500;
    }
    .hist-status.filled  { background: #dcfce7; color: #16a34a; }
    .hist-status.partial { background: #fef9c3; color: #a16207; }
    .hist-status.error   { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>
  <h2>AI Job Filler</h2>
  <div id="platform">Checking page…</div>
  <button id="fillBtn" disabled>Fill Application</button>
  <div id="log"></div>
  <p class="note">Resume upload must be done manually (browser security restriction).</p>

  <div id="historySection">
    <div class="hist-header">
      <span class="hist-title">History</span>
      <div class="hist-actions">
        <button id="exportBtn">Export</button>
        <button id="clearBtn">Clear</button>
      </div>
    </div>
    <div id="historyList"><div class="hist-empty">No history yet.</div></div>
  </div>

  <div class="footer"><a id="optionsLink">Settings</a></div>
  <script src="popup.js"></script>
</body>
</html>
